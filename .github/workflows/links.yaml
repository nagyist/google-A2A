name: Links

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: "00 06 * * *"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/links.yaml"
      - "lychee.toml"
      - "**/*.md"
      - "**/*.mdx"
      - "**/*.html"
      - "**/*.htm"
      - "**/*.rst"
      - "**/*.txt"

jobs:
  linkCheckerPR:
    name: Check PR links
    runs-on: ubuntu-latest
    if: github.repository == 'a2aproject/A2A' && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Get relevant changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **/*.md
            **/*.mdx
            **/*.html
            **/*.htm
            **/*.rst
            **/*.txt

      - name: No link-checkable files changed
        if: steps.changed-files.outputs.any_changed != 'true'
        run: echo "No link-checkable files changed in this PR."

      - name: Link Checker
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: lycheeverse/lychee-action@v2.0.2 # CVE-2024-48908: pin >=2.0.2
        with:
          lycheeVersion: "v0.22.0"
          args: --config lychee.toml --no-progress ${{ steps.changed-files.outputs.all_changed_files }}
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}

  linkChecker:
    runs-on: ubuntu-latest
    if: github.repository == 'a2aproject/A2A' && github.event_name != 'pull_request'
    permissions:
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install documentation dependencies
        run: uv pip install --system --upgrade -r requirements-docs.txt

      - name: Setup Buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          version: "1.71.0"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install build tools
        run: |
          PROTOC_VERSION="28.3"
          PROTOC_ZIP="protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          curl -fsSL -o /tmp/protoc.zip "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ZIP}"
          sudo unzip -q /tmp/protoc.zip -d /usr/local
          rm /tmp/protoc.zip

          go install github.com/bufbuild/protoschema-plugins/cmd/protoc-gen-jsonschema@latest
          sudo cp "$(go env GOPATH)/bin/protoc-gen-jsonschema" /usr/local/bin/

          mkdir -p third_party
          cd third_party
          git clone --depth 1 https://github.com/googleapis/googleapis.git
          cd ..

      - name: Build docs
        run: ./scripts/build_docs.sh

      - name: Clear link cache
        run: rm -rf .lycheecache

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2.0.2 # CVE-2024-48908: pin >=2.0.2
        with:
          lycheeVersion: "v0.22.0"
          args: '--config lychee.toml --exclude-path "(^|/)404\\.html$" site'
          fail: true
          output: lychee/out.md
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Issue on Failure
        if: failure() && steps.lychee.outcome == 'failure' && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: Link Checker Report
          content-filepath: ./lychee/out.md
          labels: report, automated issue
          reuse-issue: true

      - name: Close resolved link checker issue
        if: success() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          issue_number=$(gh issue list \
            --label "automated issue" \
            --label "report" \
            --state open \
            --search "Link Checker Report in:title" \
            --json number \
            --jq '.[0].number')
          if [ -n "$issue_number" ] && [ "$issue_number" != "null" ]; then
            gh issue close "$issue_number" \
              --comment "Daily link check passed; closing as resolved."
          fi
